name: Borrowing Calculator Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright browsers
      run: npx playwright install chromium

    - name: Run calculator tests
      run: npm run test:ci
      continue-on-error: true

    - name: Generate HTML report
      if: always()
      run: npm run test:html

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.node-version }}
        path: reports/
        retention-days: 30

    - name: Publish test results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: reports/results.xml
        check_name: Test Results (${{ matrix.node-version }})

    - name: Comment PR with test results
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('reports/results.json', 'utf8'));
          let totalScenarios = 0;
          let passedScenarios = 0;
          
          results.forEach(feature => {
            if (feature.elements) {
              feature.elements.forEach(scenario => {
                totalScenarios++;
                let passed = true;
                if (scenario.steps) {
                  scenario.steps.forEach(step => {
                    if (step.result?.status === 'failed') {
                      passed = false;
                    }
                  });
                }
                if (passed) passedScenarios++;
              });
            }
          });
          
          const passRate = totalScenarios > 0 ? ((passedScenarios / totalScenarios) * 100).toFixed(2) : 0;
          const comment = `## 🧪 Test Results\n\n- **Total Scenarios**: ${totalScenarios}\n- **Passed**: ${passedScenarios}\n- **Failed**: ${totalScenarios - passedScenarios}\n- **Pass Rate**: ${passRate}%\n\n[View Detailed Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
