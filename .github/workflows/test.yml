name: Borrowing Calculator Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: default

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run calculator tests
        id: tests
        run: npm run test:ci
        continue-on-error: true

      - name: Generate HTML report
        if: always()
        run: npm run test:html || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.node-version }}
          path: reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Publish test results
        if: always() && hashFiles('reports/results.xml') != ''
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/results.xml
          check_name: Test Results (${{ matrix.node-version }})

      - name: Comment PR with test results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = 'reports/results.json';
            let results = [];

            if (fs.existsSync(resultsPath)) {
              try {
                results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              } catch (error) {
                console.warn(`Could not parse test results: ${error.message}`);
              }
            }

            let totalScenarios = 0;
            let passedScenarios = 0;

            results.forEach(feature => {
              if (feature.elements) {
                feature.elements.forEach(scenario => {
                  totalScenarios++;
                  let passed = true;
                  if (scenario.steps) {
                    scenario.steps.forEach(step => {
                      if (step.result?.status === 'failed') {
                        passed = false;
                      }
                    });
                  }
                  if (passed) passedScenarios++;
                });
              }
            });

            const passRate = totalScenarios > 0 ? ((passedScenarios / totalScenarios) * 100).toFixed(2) : 0;
            const comment = `## 🧪 Test Results\n\n- **Total Scenarios**: ${totalScenarios}\n- **Passed**: ${passedScenarios}\n- **Failed**: ${totalScenarios - passedScenarios}\n- **Pass Rate**: ${passRate}%\n\n[View Detailed Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
